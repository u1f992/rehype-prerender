# from: https://github.com/npm/documentation/blob/e93dc35f55764dc1e0e1bee33601495c75544b90/content/packages-and-modules/securing-your-code/trusted-publishers.mdx?plain=1#L88-L112
name: Publish Package

on:
  push:
    tags:
      - '*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag to workspace and version
        id: resolve
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" == *@* ]]; then
            name="${TAG%@*}"
            version="${TAG##*@}"
          else
            name="rehype-prerender"
            version="$TAG"
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm test --workspace=${{ steps.resolve.outputs.name }}
      - run: npm publish --workspace=${{ steps.resolve.outputs.name }}
